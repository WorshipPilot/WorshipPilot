[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/auth/pco/callback"
  to = "/.netlify/functions/pco-callback"
  status = 200

[[redirects]]
  from = "/auth/pco/connect"
  to = "/.netlify/functions/pco-connect"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
